server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trading_signals
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: VGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIEpXVCB0b2tlbiBnZW5lcmF0aW9uIGFuZCB2YWxpZGF0aW9u
    expiration: 86400000
  binance:
    base-url: https://api.binance.com/api/v3
  cors:
    allowed-origins: http://localhost:5173

springdoc:
  swagger-ui:
    path: /swagger-ui.html
